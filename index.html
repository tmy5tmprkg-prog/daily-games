<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <meta name="description" content="Daily emoji pair matching puzzles">
  <title>Daily Games</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Password gate -->
  <div id="password-gate" hidden>
    <div class="pw-card">
      <h1>🎮 Daily Games</h1>
      <p>Enter the password to play</p>
      <form id="pw-form">
        <input
          id="pw-input"
          type="password"
          placeholder="Password"
          autocomplete="current-password"
          autofocus
          required
        >
        <button type="submit">Enter</button>
      </form>
      <div id="pw-error" role="alert"></div>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" hidden>
    <nav id="tab-bar" role="tablist">
      <button class="tab active" role="tab" data-game="pairs" aria-selected="true">
        Pairs 🃏
      </button>
      <button class="tab" role="tab" data-game="elements" aria-selected="false">
        Elements 🜂
      </button>
    </nav>
    <main id="game-area" role="main"></main>
  </div>

  <!-- Pairs game template -->
  <template id="pairs-template">
    <div class="pairs-header">
      <h2>Emoji Pairs</h2>
      <div class="pairs-meta">
        <span class="pairs-date"></span>
        <span class="pairs-streak"></span>
      </div>
    </div>
    <div class="pairs-grid" role="grid" aria-label="Emoji matching grid"></div>
    <div class="pairs-controls">
      <button class="reset-btn" aria-label="Reset board">↺</button>
    </div>
    <div class="pairs-status" aria-live="polite">0 / 8 pairs formed</div>

    <div class="win-overlay" hidden role="dialog" aria-modal="true" aria-label="Puzzle complete">
      <canvas class="confetti-canvas"></canvas>
      <div class="win-card">
        <button class="win-close" aria-label="Close">✕</button>
        <h2>🎉 Solved!</h2>
        <p>You matched all 8 pairs.</p>
        <div class="streak"></div>
        <button class="share-btn">Share result</button>
      </div>
    </div>
  </template>

  <!-- Elements game template -->
  <template id="elements-template">
    <div class="elements-header">
      <h2>Elements 🜂</h2>
      <div class="elements-meta">
        <span class="elements-date"></span>
        <span class="elements-streak"></span>
      </div>
    </div>
    <div class="elements-difficulty" role="tablist" aria-label="Difficulty">
      <button class="elements-tier-pill" type="button" role="tab" data-tier="easy">Easy</button>
      <button class="elements-tier-pill" type="button" role="tab" data-tier="medium">Medium</button>
      <button class="elements-tier-pill" type="button" role="tab" data-tier="hard">Hard</button>
    </div>
    <div class="elements-target">
      <span class="elements-mode-badge">Daily</span>
      <span class="elements-target-label">Goal</span>
      <span class="elements-target-emoji" aria-live="polite"></span>
    </div>
    <div class="elements-pool" role="grid" aria-label="Discovered emojis"></div>
    <div class="elements-controls">
      <span class="elements-moves" aria-live="polite">Moves: 0</span>
      <button class="elements-reset-btn" type="button" aria-label="Reset board">↺</button>
      <button class="elements-new-btn" type="button" aria-label="Generate a new practice puzzle">🎲 New puzzle</button>
    </div>
    <p class="elements-hint">Drag one emoji onto another to combine them.</p>

    <div class="elements-win-overlay win-overlay" hidden role="dialog" aria-modal="true" aria-label="Puzzle complete">
      <canvas class="confetti-canvas"></canvas>
      <div class="win-card">
        <button class="win-close" aria-label="Close">✕</button>
        <h2 class="elements-win-title">🎉 Combined!</h2>
        <p class="elements-win-tier"></p>
        <p class="elements-win-moves"></p>
        <div class="streak"></div>
        <button class="share-btn">Share result</button>
      </div>
    </div>
  </template>

  <noscript>
    <style>#password-gate,#app{display:none}</style>
    <p style="text-align:center;padding:40px;font-family:sans-serif">
      JavaScript is required to play Daily Games.
    </p>
  </noscript>

  <script type="module" src="js/app.js"></script>
</body>
</html>
